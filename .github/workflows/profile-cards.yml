name: Generate Profile Cards

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=rohitpeets&show_icons=true&hide_border=true&title_color=00BFFF&icon_color=00BFFF&text_color=E6EDF3&bg_color=0D1117
          path: profile-assets/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top-langs card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=rohitpeets&layout=compact&hide_border=true&title_color=00BFFF&text_color=E6EDF3&bg_color=0D1117
          path: profile-assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: rohitpeets
          output_path: profile-assets/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move trophy into place
        run: |
          mkdir -p profile-assets
          if [ -f trophy.svg ]; then mv -f trophy.svg profile-assets/trophy.svg; fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-assets/
          git diff --staged --quiet || git commit -m "chore: refresh profile cards"
          git push
